algorithmResult:
  type: categorical
  values:
    externalArchive:
      conditionalParameters:
        populationSizeWithArchive:
          type: integer
          range:
          - 73
          - 129
        archiveType:
          type: categorical
          values:
            unboundedArchive: {}
createInitialSolutions:
  type: categorical
  values:
    default: {}
    latinHypercubeSampling: {}
    scatterSearch: {}
    sobol: {}
    cauchy: {}
    oppositionBased: {}
offspringPopulationSize:
  type: categorical
  values:
  - 1
  - 5
  - 10
  - 20
  - 50
  - 100
  - 200
  - 400
variation:
  type: categorical
  values:
    crossoverAndMutationVariation:
      conditionalParameters:
        crossover:
          type: categorical
          globalSubParameters:
            crossoverProbability:
              type: double
              range:
              - 0.739783
              - 0.999736
            crossoverRepairStrategy:
              type: categorical
              values:
              - bounds
          values:
            laplace:
              conditionalParameters:
                laplaceCrossoverScale:
                  type: double
                  range:
                  - 0.1
                  - 0.5
        mutation:
          type: categorical
          globalSubParameters:
            mutationProbabilityFactor:
              type: double
              range:
              - 0.0
              - 2.0
            mutationRepairStrategy:
              type: categorical
              values:
                bounds: {}
          values:
            uniform:
              conditionalParameters:
                uniformMutationPerturbation:
                  type: double
                  range:
                  - 0.0
                  - 1.0
            polynomial:
              conditionalParameters:
                polynomialMutationDistributionIndex:
                  type: double
                  range:
                  - 5.0
                  - 400.0
            linkedPolynomial:
              conditionalParameters:
                linkedPolynomialMutationDistributionIndex:
                  type: double
                  range:
                  - 5.0
                  - 400.0
            nonUniform:
              conditionalParameters:
                nonUniformMutationPerturbation:
                  type: double
                  range:
                  - 0.0
                  - 1.0
            levyFlight:
              conditionalParameters:
                levyFlightMutationBeta:
                  type: double
                  range:
                  - 1.0
                  - 2.0
                levyFlightMutationStepSize:
                  type: double
                  range:
                  - 0.01
                  - 1.0
            powerLaw:
              conditionalParameters:
                powerLawMutationDelta:
                  type: double
                  range:
                  - 0.1
                  - 10.0
selection:
  type: categorical
  values:
    tournament:
      conditionalParameters:
        selectionTournamentSize:
          type: integer
          range:
          - 2
          - 10
    random: {}
    boltzmann:
      conditionalParameters:
        boltzmannTemperature:
          type: double
          range:
          - 52.632567
          - 89.65265
    ranking: {}
    stochasticUniversalSampling: {}
