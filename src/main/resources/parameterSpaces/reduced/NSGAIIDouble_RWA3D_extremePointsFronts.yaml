algorithmResult:
  type: categorical
  values:
    externalArchive:
      conditionalParameters:
        populationSizeWithArchive:
          type: integer
          range:
          - 10
          - 22
        archiveType:
          type: categorical
          values:
            unboundedArchive: {}
createInitialSolutions:
  type: categorical
  values:
    default: {}
    latinHypercubeSampling: {}
    scatterSearch: {}
    sobol: {}
    cauchy: {}
    oppositionBased: {}
offspringPopulationSize:
  type: categorical
  values:
  - 1
  - 5
  - 10
  - 20
  - 50
  - 100
  - 200
  - 400
variation:
  type: categorical
  values:
    crossoverAndMutationVariation:
      conditionalParameters:
        crossover:
          type: categorical
          globalSubParameters:
            crossoverProbability:
              type: double
              range:
              - 0.0
              - 1.0
            crossoverRepairStrategy:
              type: categorical
              values:
              - random
              - round
              - bounds
          values:
            SBX:
              conditionalParameters:
                sbxDistributionIndex:
                  type: double
                  range:
                  - 5.0
                  - 400.0
            blxAlpha:
              conditionalParameters:
                blxAlphaCrossoverAlpha:
                  type: double
                  range:
                  - 0.925091
                  - 0.992104
            wholeArithmetic: {}
            blxAlphaBeta:
              conditionalParameters:
                blxAlphaBetaCrossoverBeta:
                  type: double
                  range:
                  - 0.0
                  - 1.0
                blxAlphaBetaCrossoverAlpha:
                  type: double
                  range:
                  - 0.0
                  - 1.0
            arithmetic: {}
            laplace:
              conditionalParameters:
                laplaceCrossoverScale:
                  type: double
                  range:
                  - 0.437177
                  - 0.438669
            fuzzyRecombination:
              conditionalParameters:
                fuzzyRecombinationCrossoverAlpha:
                  type: double
                  range:
                  - 0.0
                  - 1.0
            PCX:
              conditionalParameters:
                pcxCrossoverZeta:
                  type: double
                  range:
                  - 0.0
                  - 1.0
                pcxCrossoverEta:
                  type: double
                  range:
                  - 0.0
                  - 1.0
            UNDC:
              conditionalParameters:
                undcCrossoverZeta:
                  type: double
                  range:
                  - 0.1
                  - 1.0
                undcCrossoverEta:
                  type: double
                  range:
                  - 0.1
                  - 0.5
        mutation:
          type: categorical
          globalSubParameters:
            mutationProbabilityFactor:
              type: double
              range:
              - 0.0
              - 2.0
            mutationRepairStrategy:
              type: categorical
              values:
                round: {}
          values:
            powerLaw:
              conditionalParameters:
                powerLawMutationDelta:
                  type: double
                  range:
                  - 0.1
                  - 10.0
selection:
  type: categorical
  values:
    tournament:
      conditionalParameters:
        selectionTournamentSize:
          type: integer
          range:
          - 2
          - 10
    random: {}
    boltzmann:
      conditionalParameters:
        boltzmannTemperature:
          type: double
          range:
          - 0.1
          - 100.0
    ranking: {}
    stochasticUniversalSampling: {}
