algorithmResult:
  type: categorical
  values:
    population: {}
    externalArchive:
      conditionalParameters:
        populationSizeWithArchive:
          type: integer
          range: [10, 200]
        archiveType:
          type: categorical
          values:
            crowdingDistanceArchive:
            unboundedArchive:

createInitialSolutions:
  type: categorical
  values:
    default:

offspringPopulationSize:
  type: categorical
  values: [1, 2, 5, 10, 20, 50, 100, 200, 400]

densityEstimator:
  type: categorical
  values:
    crowdingDistance:
    knn:
      conditionalParameters:
        knnNeighborhoodSize:
          type: integer
          range: [1, 5]
        knnNormalizeObjectives:
          type: categorical
          values:
            "true":
            "false":

ranking:
  type: categorical
  values:
    dominanceRanking:
    strengthRanking:

variation:
  type: categorical
  values:
    crossoverAndMutationVariation:
      conditionalParameters:
        crossover:
          type: categorical
          globalSubParameters:
            crossoverProbability:
              type: double
              range: [0.6, 0.9]
          values:
            PMX:
            OXD:
            CX:
        mutation:
          type: categorical
          globalSubParameters:
            mutationProbability:
              type: double
              range: [0.05, 0.1]
          values:
            swap:
            insert:
            scramble:
            inversion:
            simpleInversion:
            displacement:
#
selection:
  type: categorical
  values:
    tournament:
      conditionalParameters:
        selectionTournamentSize:
          type: integer
          range: [2, 10]
    random:

#
replacement:
  type: categorical
  values:
    rankingAndDensityEstimator:
      conditionalParameters:
        removalPolicy:
          type: categorical
          values:
            oneShot:
            sequential:
